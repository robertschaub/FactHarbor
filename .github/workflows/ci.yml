name: Main Guardrail CI

run-name: Main Guardrail - ${{ github.event_name }} on ${{ github.ref_name }}

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    name: Test and Build (CI-safe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: "npm"

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-v2-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('apps/web/**/*.js', 'apps/web/**/*.jsx', 'apps/web/**/*.ts', 'apps/web/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-v2-${{ hashFiles('**/package-lock.json') }}-

      - name: Install JS deps
        run: npm ci

      - name: Run CI-safe tests
        run: npm run test:ci

      - name: Build Web
        run: npm --workspace apps/web run build

      - name: Build API
        run: dotnet build apps/api -c Release
